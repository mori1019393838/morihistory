```html
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모리역사연구소</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8F5F0; }
        .ql-container { min-height: 300px; font-size: 16px; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.6); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-white shadow-md py-5 px-4 border-t-8 border-[#8B4513] sticky top-0 z-30">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-serif font-bold cursor-pointer" onclick="showHome()">모리역사연구소</h1>
            <button onclick="showWrite()" class="bg-[#242b2e] text-white px-5 py-2.5 rounded shadow hover:bg-[#8B4513] transition font-bold">기록하기</button>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full p-4 py-8">
        <div id="home-section">
            <h2 class="text-3xl font-serif font-extrabold mb-8 border-b-2 border-[#E6DCC8] pb-3" id="view-title">전체 연구 기록</h2>
            <div id="posts-container" class="space-y-6"></div>
        </div>

        <div id="write-section" style="display: none;" class="bg-white p-8 rounded-xl shadow-lg border border-[#E6DCC8]">
            <h2 class="text-3xl font-serif font-bold mb-6 text-center">새 기록 작성</h2>
            <input type="text" id="post-title" placeholder="제목" class="w-full px-4 py-3 border rounded mb-4">
            <select id="post-category" class="w-full px-4 py-3 border rounded mb-4">
                <option value="고대사">고대사</option><option value="중세사">중세사</option>
                <option value="근대사">근대사</option><option value="현대사" selected>현대사</option>
            </select>
            <div id="editor-container" class="mb-4"></div>
            <div class="flex justify-end gap-3">
                <button onclick="showHome()" class="px-6 py-3 bg-gray-200 rounded font-bold">취소</button>
                <button onclick="openModal('save')" class="px-8 py-3 bg-[#8B4513] text-white rounded font-bold">기록 보존하기</button>
            </div>
        </div>
    </main>

    <!-- 암호 팝업 -->
    <div id="password-modal" class="fixed inset-0 modal-bg z-50 flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-80 text-center">
            <h3 class="font-bold mb-4">관리자 인증</h3>
            <input type="password" id="modal-pw" class="w-full p-3 border rounded mb-4 text-center tracking-widest text-lg">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 p-3 bg-gray-200 rounded">취소</button>
                <button onclick="verifyPassword()" class="flex-1 p-3 bg-[#8B4513] text-white rounded">확인</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        var quill = new Quill('#editor-container', { theme: 'snow' });
        var db = firebase.initializeApp({apiKey:"AIzaSyDLfbCS-MJXNNtrFjtmn_giVckuq9YTEno", projectId:"mori-history"}).firestore();
        var currentAction = '', targetId = '';

        db.collection('mori_posts').onSnapshot(function(snap) {
            var html = '';
            var posts = [];
            snap.forEach(function(d) { posts.push(d.data()); });
            posts.sort((a,b) => b.time - a.time).forEach(function(d) {
                html += `<article class="bg-white p-6 rounded shadow border relative">
                    <button onclick="confirmDelete('${d.id}')" class="absolute top-4 right-4 text-red-500 font-bold">삭제</button>
                    <span class="text-xs bg-gray-800 text-white px-2 py-1">${d.category}</span>
                    <h3 class="text-2xl font-bold mt-2">${d.title}</h3>
                    <div class="mt-4">${d.content}</div>
                </article>`;
            });
            document.getElementById('posts-container').innerHTML = html || '기록 없음';
        });

        function showHome() { document.getElementById('home-section').style.display = 'block'; document.getElementById('write-section').style.display = 'none'; }
        function showWrite() { document.getElementById('home-section').style.display = 'none'; document.getElementById('write-section').style.display = 'block'; }
        
        function openModal(action, id) { currentAction = action; targetId = id; document.getElementById('password-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('password-modal').classList.add('hidden'); }
        function confirmDelete(id) { openModal('delete', id); }

        function verifyPassword() {
            if (document.getElementById('modal-pw').value === '1019393838') {
                closeModal();
                if (currentAction === 'save') saveToDb();
                else deleteFromDb(targetId);
            } else { alert('비밀번호 오류'); }
        }

        function saveToDb() {
            var id = Date.now().toString();
            db.collection('mori_posts').doc(id).set({
                id: id, title: document.getElementById('post-title').value,
                category: document.getElementById('post-category').value,
                content: quill.root.innerHTML, time: Date.now()
            }).then(() => { alert('저장됨'); showHome(); });
        }

        function deleteFromDb(id) {
            db.collection('mori_posts').doc(id).delete().then(() => alert('삭제됨'));
        }
    </script>
</body>
</html>
