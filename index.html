```html
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모리역사연구소</title>
    <!-- 기본 폰트 및 스타일 -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8F5F0; color: #242b2e; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); }
        .ql-container.ql-snow { min-height: 300px; background-color: white; font-size: 16px; }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header class="bg-white shadow-md py-5 px-4 border-t-8 border-[#8B4513] sticky top-0 z-30">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold cursor-pointer" onclick="showSection('home')">모리역사연구소</h1>
            <button onclick="showSection('write')" class="bg-[#242b2e] text-white px-5 py-2.5 rounded shadow-lg"><i class="fa-solid fa-pen-nib"></i> 기록하기</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto w-full p-4 py-8">
        <!-- 보관소(메인) 화면 -->
        <section id="home-section" class="block">
            <h2 class="text-3xl font-extrabold mb-8 border-b-2 border-gray-300 pb-3">전체 연구 기록</h2>
            <div id="posts-container" class="space-y-6"></div>
        </section>

        <!-- 글쓰기 화면 -->
        <section id="write-section" class="hidden bg-white p-6 rounded-xl shadow-xl border">
            <h2 class="text-3xl font-extrabold mb-8 text-center border-b-2 border-gray-100 pb-5">새 연구 기록 작성</h2>
            <form id="blog-form" onsubmit="requestSavePost(event)" class="space-y-6">
                <div><label class="block font-bold mb-2">기록 제목</label><input type="text" id="post-title" required class="w-full px-4 py-3 border rounded bg-gray-50"></div>
                <div><label class="block font-bold mb-2">일자</label><input type="date" id="post-date" required class="w-full px-4 py-2 border rounded bg-gray-50"></div>
                <div><label class="block font-bold mb-2">시대 분류</label><select id="post-category" class="w-full px-4 py-2 border rounded bg-gray-50"><option value="현대사">현대사</option></select></div>
                <div><label class="block font-bold mb-2">연구 내용</label><div id="editor-container"></div></div>
                <div class="flex justify-end pt-8">
                    <button type="button" onclick="showSection('home')" class="px-6 py-3 border rounded mr-3">취소</button>
                    <button type="submit" class="px-8 py-3 bg-[#242b2e] text-white rounded shadow-md font-bold">기록 보존하기</button>
                </div>
            </form>
        </section>
    </main>

    <!-- 암호 모달 -->
    <div id="password-modal" class="fixed inset-0 modal-bg z-50 flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-11/12 max-w-sm text-center">
            <h3 class="text-2xl font-extrabold mb-4">권한 인증</h3>
            <input type="password" id="modal-pw" placeholder="암호 10자리" class="w-full px-4 py-3 border-2 rounded mb-5 text-center tracking-widest">
            <div class="flex gap-3">
                <button type="button" onclick="closeModal()" class="w-1/2 px-4 py-3 bg-gray-100 rounded font-bold">취소</button>
                <button type="button" onclick="confirmPassword()" class="w-1/2 px-4 py-3 bg-[#8B4513] text-white rounded font-bold">확인</button>
            </div>
        </div>
    </div>

    <!-- 호환성 뛰어난 안정적인 구버전 파이어베이스 (모듈 에러 방지) -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script>
        var db;
        var quill = new Quill('#editor-container', { theme: 'snow', placeholder: '내용을 입력하세요...' });
        document.getElementById('post-date').valueAsDate = new Date();

        // 페이지 로딩 즉시 팝업창 띄우기 (이게 안 뜨면 깃허브 캐시 문제임)
        window.onload = function() {
            setTimeout(function() {
                alert("🚨 [알림] 최신 오류 추적 코드로 접속되었습니다!\n이제 테스트 글을 작성해 보세요.");
            }, 500);
        };

        try {
            firebase.initializeApp({
                apiKey: "AIzaSyDLfbCS-MJXNNtrFjtmn_giVckuq9YTEno",
                authDomain: "mori-history.firebaseapp.com",
                projectId: "mori-history",
                storageBucket: "mori-history.firebasestorage.app",
                messagingSenderId: "582598628309",
                appId: "1:582598628309:web:b5e8bfdecd0eae5ae5e35c"
            });
            db = firebase.firestore();
            
            db.collection('mori_posts').onSnapshot(function(snapshot) {
                var container = document.getElementById('posts-container');
                container.innerHTML = '';
                var postsCount = 0;
                snapshot.forEach(function(doc) {
                    postsCount++;
                    var data = doc.data();
                    container.innerHTML += '<article class="bg-white p-6 rounded-xl shadow mb-4"><h3 class="text-2xl font-bold mb-2">' + data.title + '</h3><p class="text-sm text-gray-500 mb-4">' + data.date + '</p><div>' + data.content + '</div></article>';
                });
                if(postsCount === 0) container.innerHTML = '<p class="text-center py-10 text-gray-500">기록이 없습니다.</p>';
            }, function(error) {
                alert("🚨 파이어베이스 로딩 에러: " + error.message + "\n(데이터베이스 규칙이 잠겨있습니다.)");
            });
        } catch (e) {
            alert("🚨 파이어베이스 초기화 실패: " + e.message);
        }

        function showSection(name) {
            document.getElementById('home-section').style.display = name === 'home' ? 'block' : 'none';
            document.getElementById('write-section').style.display = name === 'write' ? 'block' : 'none';
            if(name === 'write') { document.getElementById('blog-form').reset(); quill.setContents([]); }
        }

        function requestSavePost(event) {
            event.preventDefault();
            alert("✅ [테스트 1] 기록 보존 버튼을 눌렀습니다. 암호창을 띄웁니다.");
            document.getElementById('modal-pw').value = '';
            document.getElementById('password-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('password-modal').classList.add('hidden'); }

        function confirmPassword() {
            var pw = document.getElementById('modal-pw').value;
            if (pw === '1019393838') {
                closeModal();
                alert("✅ [테스트 2] 암호가 맞습니다! 이제 클라우드 창고에 저장을 시도합니다...");
                executeSavePost();
            } else {
                alert("❌ 암호가 틀렸습니다. 다시 입력하세요.");
            }
        }

        function executeSavePost() {
            var id = Date.now().toString();
            var newPost = {
                id: id,
                title: document.getElementById('post-title').value,
                date: document.getElementById('post-date').value,
                category: document.getElementById('post-category').value,
                content: quill.root.innerHTML
            };

            db.collection('mori_posts').doc(id).set(newPost)
            .then(function() {
                alert("🎉 [최종 성공!] 파이어베이스에 글이 완벽하게 저장되었습니다!");
                showSection('home');
            })
            .catch(function(error) {
                alert("❌ [저장 실패 에러 발생!] 이유: " + error.message + "\n\n(규칙 설정이 아직 잠겨있거나 네트워크 오류입니다.)");
            });
        }
    </script>
</body>
</html>
