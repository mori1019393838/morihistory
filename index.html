    <div id="password-modal" class="fixed inset-0 modal-bg z-50 flex items-center justify-center hidden">

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        var ColorStyle = Quill.import('attributors/style/color');
        var BackgroundStyle = Quill.import('attributors/style/background');
        Quill.register(ColorStyle, true); Quill.register(BackgroundStyle, true);

        window.posts = []; window.currentCategory = '전체'; window.currentSearchTerm = ''; window.currentImageDataUrl = ''; window.dbRef = null; window.isFirebaseReady = false; window.currentPage = 1; window.currentAction = null; window.pendingEvent = null; window.pendingActionData = null;
        const POSTS_PER_PAGE = 5;

        var quill = new Quill('#editor-container', { theme: 'snow', placeholder: '이곳에 연구 내용을 상세히 기록하십시오...', modules: { toolbar: [ [{ 'header': [1, 2, false] }], ['bold', 'italic', 'underline', 'strike'], [{ 'color': [] }, { 'background': [] }], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['blockquote', 'link'], ['clean'] ] } });
        document.getElementById('post-date').valueAsDate = new Date();

        try {
            const firebaseConfig = { apiKey: "AIzaSyDLfbCS-MJXNNtrFjtmn_giVckuq9YTEno", authDomain: "mori-history.firebaseapp.com", projectId: "mori-history", storageBucket: "mori-history.firebasestorage.app", messagingSenderId: "582598628309", appId: "1:582598628309:web:b5e8bfdecd0eae5ae5e35c" };
            const app = initializeApp(firebaseConfig); const db = getFirestore(app); window.dbRef = collection(db, 'mori_posts'); window.isFirebaseReady = true;
            document.getElementById('cloud-status').className = "mt-8 text-xs text-center px-3 py-3 rounded-lg bg-green-100 text-green-800 font-bold border border-green-300 flex items-center justify-center gap-2 shadow-inner";
            document.getElementById('cloud-status').innerHTML = '<i class="fa-solid fa-cloud-check text-lg"></i> 클라우드 동기화 켜짐';
            onSnapshot(window.dbRef, (snapshot) => { window.posts = []; snapshot.forEach((doc) => { window.posts.push(doc.data()); }); window.renderPosts(); }, (error) => { console.error(error); });
        } catch (e) { console.error(e); }

        window.showSection = function(sectionName) {
            document.getElementById('home-section').classList.add('hidden'); document.getElementById('write-section').classList.add('hidden');
            document.getElementById('sidebar').style.display = sectionName === 'home' ? 'block' : 'none'; document.getElementById('search-container').style.display = sectionName === 'home' ? 'block' : 'none';
            if (sectionName === 'home') { document.getElementById('home-section').classList.remove('hidden'); window.currentCategory = '전체'; window.currentSearchTerm = ''; document.getElementById('search-input').value = ''; window.currentPage = 1; window.updateCategoryButtons(); window.renderPosts(); } 
            else if (sectionName === 'write') { document.getElementById('write-section').classList.remove('hidden'); document.getElementById('blog-form').reset(); quill.setContents([]); window.removeImage(); document.getElementById('post-date').valueAsDate = new Date(); }
        }

        window.openModal = function(actionType, eventOrId, extraData = null) {
            window.currentAction = actionType; window.pendingEvent = eventOrId; window.pendingActionData = extraData;
            if (actionType === 'save') { document.getElementById('modal-title').innerText = "기록 보존 인증"; document.getElementById('modal-desc').innerText = "새로운 기록을 클라우드에 보존하려면 암호를 입력하세요."; } 
            else if (actionType === 'delete') { document.getElementById('modal-title').innerText = "기록 삭제 인증"; document.getElementById('modal-desc').innerText = "기록을 영구 삭제하려면 암호를 입력하세요."; } 
            else if (actionType === 'deleteComment') { document.getElementById('modal-title').innerText = "댓글 삭제 인증"; document.getElementById('modal-desc').innerText = "관리자 권한으로 댓글을 삭제합니다."; }
            document.getElementById('modal-pw').value = ''; document.getElementById('modal-error').classList.add('hidden'); document.getElementById('password-modal').classList.remove('hidden'); setTimeout(() => document.getElementById('modal-pw').focus(), 100);
        }

        window.closeModal = function() { document.getElementById('password-modal').classList.add('hidden'); window.currentAction = null; window.pendingEvent = null; window.pendingActionData = null; }

        window.confirmPassword = function() {
            const pw = document.getElementById('modal-pw').value;
            if (pw === '1019393838') { 
                window.closeModal();
                if (window.currentAction === 'save') window.executeSavePost(); else if (window.currentAction === 'delete') window.executeDeletePost(window.pendingEvent); else if (window.currentAction === 'deleteComment') window.executeDeleteComment(window.pendingEvent, window.pendingActionData);
            } else { document.getElementById('modal-error').classList.remove('hidden'); }
        }

        window.requestSavePost = function(event) { event.preventDefault(); if(quill.getText().trim().length === 0) { alert("연구 내용을 입력해주세요."); return; } window.openModal('save', event); }

        window.executeSavePost = async function() {
            if (!window.isFirebaseReady) return alert("클라우드 서버 연결이 필요합니다.");
            const title = document.getElementById('post-title').value; const date = document.getElementById('post-date').value; const category = document.getElementById('post-category').value; const contentHTML = quill.root.innerHTML; const id = Date.now().toString();
            const newPost = { id, title, date, category, content: contentHTML, image: window.currentImageDataUrl, views: 0, comments: [] };
            try { await setDoc(doc(window.dbRef, id), newPost); window.showSection('home'); window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { alert('저장 에러 발생'); console.error(e); }
        }

        window.executeDeletePost = async function(id) { if (!window.isFirebaseReady) return; try { await deleteDoc(doc(window.dbRef, id.toString())); } catch(e) { console.error(e); } }
        window.incrementViews = async function(id) { if (!window.isFirebaseReady) return; const post = window.posts.find(p => p.id === id.toString()); if(post) { try { await updateDoc(doc(window.dbRef, id.toString()), { views: (post.views || 0) + 1 }); } catch(e) { console.error(e); } } }
        
        window.addComment = async function(postId) {
            if (!window.isFirebaseReady) return alert("서버 연결이 필요합니다."); const inputEl = document.getElementById(`comment-input-${postId}`); const text = inputEl.value.trim(); if(!text) return;
            const post = window.posts.find(p => p.id === postId.toString());
            if(post) { const newComment = { id: Date.now().toString(), text: text, date: new Date().toLocaleDateString() }; const updatedComments = post.comments ? [...post.comments, newComment] : [newComment]; try { await updateDoc(doc(window.dbRef, postId.toString()), { comments: updatedComments }); inputEl.value = ''; } catch(e) { console.error(e); } }
        }
        window.requestDeleteComment = function(postId, commentId) { window.openModal('deleteComment', postId, commentId); }
        window.executeDeleteComment = async function(postId, commentId) { if (!window.isFirebaseReady) return; const post = window.posts.find(p => p.id === postId.toString()); if(post && post.comments) { const updatedComments = post.comments.filter(c => c.id !== commentId); try { await updateDoc(doc(window.dbRef, postId.toString()), { comments: updatedComments }); } catch(e) { console.error(e); } } }
        
        window.sharePost = function(title, postId) { const dummyUrl = window.location.href.split('?')[0] + `?post=${postId}`; if (navigator.share) { navigator.share({ title: `모리역사연구소: ${title}`, text: '흥미로운 역사 기록을 확인해보세요.', url: dummyUrl }).catch(console.error); } else { const el = document.createElement('textarea'); el.value = dummyUrl; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("게시글 링크가 클립보드에 복사되었습니다."); } }

        window.previewImage = function(event) {
            const file = event.target.files[0];
            if (file) { const reader = new FileReader(); reader.onload = function(e) { const img = new Image(); img.onload = function() { const canvas = document.createElement('canvas'); let width = img.width; let height = img.height; if (width > 800 || height > 800) { if (width > height) { height = Math.round((height *= 800 / width)); width = 800; } else { width = Math.round((width *= 800 / height)); height = 800; } } canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height); window.currentImageDataUrl = canvas.toDataURL('image/jpeg', 0.6); document.getElementById('image-preview').src = window.currentImageDataUrl; document.getElementById('image-preview-container').classList.remove('hidden'); }; img.src = e.target.result; }; reader.readAsDataURL(file); }
        }
        window.removeImage = function() { window.currentImageDataUrl = ''; document.getElementById('post-image').value = ''; document.getElementById('image-preview-container').classList.add('hidden'); document.getElementById('image-preview').src = ''; }

        window.filterCategory = function(category) { window.currentCategory = category; window.currentPage = 1; window.updateCategoryButtons(); window.renderPosts(); }
        window.updateCategoryButtons = function() { const btns = document.querySelectorAll('.category-btn'); btns.forEach(btn => { if (btn.innerText.includes(window.currentCategory)) { btn.className = 'category-btn w-full text-left px-4 py-3 rounded-lg bg-history-accent text-white font-bold transition shadow'; } else { btn.className = 'category-btn w-full text-left px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700 transition'; } }); document.getElementById('current-view-title').innerText = window.currentCategory === '전체' ? '전체 연구 기록' : `${window.currentCategory} 기록`; }
        window.searchPosts = function() { window.currentSearchTerm = document.getElementById('search-input').value.toLowerCase(); window.currentPage = 1; window.renderPosts(); }
        window.togglePostContent = function(id) { const contentDiv = document.getElementById(`post-body-${id}`); const iconDiv = document.getElementById(`toggle-icon-${id}`); if(contentDiv.classList.contains('hidden')) { contentDiv.classList.remove('hidden'); iconDiv.style.transform = 'rotate(180deg)'; window.incrementViews(id); } else { contentDiv.classList.add('hidden'); iconDiv.style.transform = 'rotate(0deg)'; } }
        window.goToPage = function(page) { window.currentPage = page; window.renderPosts(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        window.renderPosts = function() {
            const container = document.getElementById('posts-container'); const paginationContainer = document.getElementById('pagination-controls');
